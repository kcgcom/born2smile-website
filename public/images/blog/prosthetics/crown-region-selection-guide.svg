<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="820" fill="#F8F6F1"/>
  <rect x="64" y="64" width="1072" height="692" rx="36" fill="#FFFDFA" stroke="#E8E1D6" stroke-width="2"/>

  <text x="110" y="138" fill="#253042" font-family="Pretendard, sans-serif" font-size="38" font-weight="700">앞니와 어금니는 선택 기준이 다릅니다</text>
  <text x="110" y="180" fill="#5E6775" font-family="Pretendard, sans-serif" font-size="23">전치부는 보이는 영역, 구치부는 씹는 힘을 더 많이 받는 영역이라는 차이가 있어요.</text>

  <rect x="110" y="232" width="446" height="428" rx="28" fill="#FBF8F1" stroke="#E9E1D2" stroke-width="2"/>
  <rect x="644" y="232" width="446" height="428" rx="28" fill="#FBF8F1" stroke="#E9E1D2" stroke-width="2"/>

  <text x="156" y="290" fill="#2B3340" font-family="Pretendard, sans-serif" font-size="32" font-weight="700">앞니에서 먼저 보는 것</text>
  <text x="690" y="290" fill="#2B3340" font-family="Pretendard, sans-serif" font-size="32" font-weight="700">어금니에서 먼저 보는 것</text>

  <ellipse cx="333" cy="400" rx="116" ry="86" fill="#F3EBDD"/>
  <rect x="252" y="356" width="22" height="82" rx="11" fill="#FFFDF8" stroke="#CDBAA0" stroke-width="3"/>
  <rect x="282" y="344" width="28" height="100" rx="14" fill="#FFFDF8" stroke="#CDBAA0" stroke-width="3"/>
  <rect x="318" y="340" width="30" height="106" rx="15" fill="#FFFDF8" stroke="#CDBAA0" stroke-width="3"/>
  <rect x="356" y="344" width="28" height="100" rx="14" fill="#FFFDF8" stroke="#CDBAA0" stroke-width="3"/>
  <rect x="392" y="356" width="22" height="82" rx="11" fill="#FFFDF8" stroke="#CDBAA0" stroke-width="3"/>

  <ellipse cx="867" cy="400" rx="116" ry="86" fill="#EFE5D3"/>
  <path d="M796 374C796 338 826 312 862 320L884 325L906 320C942 312 972 338 972 374V442C972 486 936 522 892 522H842C798 522 762 486 762 442V374C762 338 792 312 828 320L850 325L872 320" fill="#FFFDF8" stroke="#B89A67" stroke-width="4"/>

  <g fill="#4F5968" font-family="Pretendard, sans-serif" font-size="24">
    <text x="156" y="540">• 색과 투명도가 자연스러운지</text>
    <text x="156" y="586">• 웃을 때 경계가 눈에 띄지 않는지</text>
    <text x="156" y="632">• 잇몸 라인과 조화로운지</text>

    <text x="690" y="540">• 교합력과 이갈이를 견딜 수 있는지</text>
    <text x="690" y="586">• 남은 치아량과 파절 위험이 어떤지</text>
    <text x="690" y="632">• 기능을 오래 유지하기 유리한지</text>
  </g>

  <text x="110" y="714" fill="#6B7280" font-family="Pretendard, sans-serif" font-size="22">앞니에서는 ‘보이는 느낌’, 어금니에서는 ‘버티는 힘’의 비중이 커집니다. 그래서 같은 재료도 위치에 따라 판단이 달라집니다.</text>
</svg>
