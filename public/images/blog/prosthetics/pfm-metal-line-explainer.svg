<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F7F4EE"/>
  <rect x="64" y="64" width="1072" height="632" rx="36" fill="#FFFDF9" stroke="#E9E1D2" stroke-width="2"/>

  <text x="108" y="138" fill="#253042" font-family="Pretendard, sans-serif" font-size="38" font-weight="700">PFM은 왜 앞니에서 설명이 더 필요할까요?</text>
  <text x="108" y="180" fill="#5E6775" font-family="Pretendard, sans-serif" font-size="23">금속 프레임 위에 도재를 입힌 구조라서, 잇몸 경계가 많이 보이는 위치에서는 한계를 설명해야 합니다.</text>

  <rect x="110" y="236" width="420" height="376" rx="28" fill="#FBF8F1" stroke="#E9E1D2" stroke-width="2"/>
  <text x="150" y="292" fill="#2B3340" font-family="Pretendard, sans-serif" font-size="30" font-weight="700">PFM 구조</text>
  <path d="M238 340C238 292 278 252 326 252H350C398 252 438 292 438 340V460C438 518 392 564 334 564C276 564 230 518 230 460V340H238Z" fill="#BFC4CC"/>
  <path d="M254 334C254 298 284 268 320 268H356C392 268 422 298 422 334V456C422 504 384 542 336 542C288 542 250 504 250 456V334H254Z" fill="#FFF8EE"/>
  <path d="M214 396C248 374 288 364 336 364C384 364 424 374 458 396" stroke="#C79B4D" stroke-width="14" stroke-linecap="round"/>
  <text x="342" y="312" fill="#7A5A2A" font-family="Pretendard, sans-serif" font-size="22" font-weight="700">도재층</text>
  <text x="154" y="472" fill="#8A6B38" font-family="Pretendard, sans-serif" font-size="22" font-weight="700">잇몸 경계</text>
  <text x="294" y="592" fill="#4B5563" font-family="Pretendard, sans-serif" font-size="22" font-weight="700">금속 프레임</text>

  <rect x="588" y="236" width="502" height="376" rx="28" fill="#FBF8F1" stroke="#E9E1D2" stroke-width="2"/>
  <text x="628" y="292" fill="#2B3340" font-family="Pretendard, sans-serif" font-size="30" font-weight="700">이럴 때 눈에 띄기 쉽습니다</text>
  <g fill="#4F5968" font-family="Pretendard, sans-serif" font-size="24">
    <text x="628" y="374">1. 잇몸이 조금 내려가 경계가 드러난 경우</text>
    <text x="628" y="430">2. 잇몸이 얇아 어둡게 비쳐 보이는 경우</text>
    <text x="628" y="486">3. 앞니처럼 빛과 색 차이가 더 잘 보이는 경우</text>
    <text x="628" y="542">4. 아주 밝은 치아 색을 원할수록 차이가 느껴질 수 있는 경우</text>
  </g>

  <rect x="628" y="570" width="404" height="44" rx="14" fill="#F1E8D6"/>
  <text x="648" y="599" fill="#6B5A3E" font-family="Pretendard, sans-serif" font-size="20" font-weight="700">PFM이 나쁜 재료라는 뜻은 아니고, 심미 요구가 높은 위치에서 설명이 필요한 재료라는 뜻에 가깝습니다.</text>

  <text x="108" y="660" fill="#6B7280" font-family="Pretendard, sans-serif" font-size="22">어금니에서는 큰 문제가 되지 않아도, 앞니처럼 많이 보이는 부위에서는 작은 경계 차이도 더 크게 느껴질 수 있어요.</text>
</svg>
