<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#F8FBFF"/>
  <rect x="48" y="48" width="1104" height="664" rx="28" fill="white" stroke="#D9E7F5" stroke-width="2"/>
  <text x="76" y="114" fill="#0F172A" font-family="Pretendard, sans-serif" font-size="38" font-weight="700">PFM에서 말하는 “금속 라인”은 이런 뜻입니다</text>
  <text x="76" y="152" fill="#475569" font-family="Pretendard, sans-serif" font-size="20">금속 프레임 위에 도재를 입힌 구조라서, 잇몸 경계나 얇은 치은에서 어둡게 비쳐 보일 수 있습니다.</text>

  <rect x="92" y="214" width="460" height="430" rx="28" fill="#F9FBFF" stroke="#D7E8FF" stroke-width="2"/>
  <text x="132" y="268" fill="#1D4ED8" font-family="Pretendard, sans-serif" font-size="28" font-weight="700">PFM 단면 구조</text>
  <path d="M234 346C234 296 276 256 326 256H350C400 256 442 296 442 346V478C442 534 396 580 340 580H336C280 580 234 534 234 478V346Z" fill="#CBD5E1"/>
  <path d="M254 344C254 308 284 278 320 278H356C392 278 422 308 422 344V474C422 520 384 558 338 558C292 558 254 520 254 474V344Z" fill="#FFF7ED" stroke="#FB923C" stroke-width="6"/>
  <path d="M192 412C226 390 262 380 338 380C414 380 450 390 484 412" stroke="#F59E0B" stroke-width="18" stroke-linecap="round"/>
  <text x="304" y="318" fill="#334155" font-family="Pretendard, sans-serif" font-size="22" font-weight="700">도재층</text>
  <text x="286" y="608" fill="#334155" font-family="Pretendard, sans-serif" font-size="22" font-weight="700">금속 프레임</text>
  <text x="170" y="446" fill="#92400E" font-family="Pretendard, sans-serif" font-size="22" font-weight="700">잇몸 경계</text>

  <rect x="606" y="214" width="502" height="430" rx="28" fill="#FFFBF2" stroke="#F3D8A3" stroke-width="2"/>
  <text x="646" y="268" fill="#B45309" font-family="Pretendard, sans-serif" font-size="28" font-weight="700">어떨 때 눈에 띌 수 있나요?</text>
  <g fill="#334155" font-family="Pretendard, sans-serif" font-size="24">
    <text x="646" y="346">1. 시간이 지나 잇몸이 약간 내려간 경우</text>
    <text x="646" y="408">2. 잇몸이 얇아서 경계부가 어둡게 비치는 경우</text>
    <text x="646" y="470">3. 앞니처럼 심미 요구가 높은 부위인 경우</text>
    <text x="646" y="532">4. 밝은 치아 색을 원하는 경우 대비가 더 느껴질 수 있음</text>
  </g>
  <rect x="646" y="572" width="406" height="42" rx="12" fill="#FEF3C7"/>
  <text x="668" y="600" fill="#92400E" font-family="Pretendard, sans-serif" font-size="20" font-weight="700">모든 PFM이 문제라는 뜻은 아니며, 심미 영역에서 특히 설명이 필요한 포인트입니다.</text>

  <text x="76" y="684" fill="#64748B" font-family="Pretendard, sans-serif" font-size="18">핵심: PFM은 여전히 검증된 재료지만, 전치부에서는 경계부 심미 한계를 함께 설명하는 것이 정확합니다.</text>
</svg>
